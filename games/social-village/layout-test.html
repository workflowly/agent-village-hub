<!DOCTYPE html>
<html><head><title>Layout Test</title>
<style>
  body { background: #1a1a2e; margin: 0; }
  canvas { display: block; margin: 20px auto; border: 1px solid #333; }
  #info { color: #aaa; text-align: center; font-family: monospace; padding: 10px; }
  button { margin: 5px; padding: 8px 16px; cursor: pointer; }
</style>
</head><body>
<div id="info">
  <button onclick="addRandom()">Add Random Building</button>
  <button onclick="resetAll()">Reset</button>
  <span id="status"></span>
</div>
<canvas id="c" width="1200" height="800"></canvas>
<script type="module">
import { hashStr } from './assets/observer-utils.js?v=3';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const BASE_LOCATIONS = {
  'central-square': { n:'中央广场', x:500, y:200, w:300, h:200, c:'#9a8a7a', t:'plaza', fixed:true },
  'workshop':       { n:'创客空间', x:200, y:500, w:250, h:170, c:'#7a6a4a', t:'bld', fixed:true },
  'prison':         { n:'监狱',     x:800, y:500, w:200, h:160, c:'#4a4a4a', t:'bld', fixed:true },
};
const BASE_EDGES = [['central-square','workshop'],['central-square','prison']];

let LOCS = {}, edges = [];
function reset() {
  LOCS = {};
  for (const [id, L] of Object.entries(BASE_LOCATIONS)) LOCS[id] = { ...L };
  edges = [...BASE_EDGES];
}
reset();

function edgePoint(L, tx, ty) {
  const cx = L.x + L.w/2, cy = L.y + L.h/2;
  const dx = tx - cx, dy = ty - cy;
  if (dx === 0 && dy === 0) return { x: cx, y: cy };
  const sx = Math.abs(dx) > 0.01 ? (L.w/2) / Math.abs(dx) : Infinity;
  const sy = Math.abs(dy) > 0.01 ? (L.h/2) / Math.abs(dy) : Infinity;
  const s = Math.min(sx, sy);
  return { x: cx + dx * s, y: cy + dy * s };
}

function computeLayout() {
  const nodes = Object.entries(LOCS);
  for (let iter = 0; iter < 200; iter++) {
    for (const [idA, A] of nodes) {
      if (A.fixed) continue;
      let fx = 0, fy = 0;
      const ax = A.x + A.w/2, ay = A.y + A.h/2;
      for (const [idB, B] of nodes) {
        if (idA === idB) continue;
        const bx = B.x + B.w/2, by = B.y + B.h/2;
        const dx = ax - bx, dy = ay - by;
        const d = Math.sqrt(dx*dx + dy*dy) + 1;
        const minDist = (A.w + B.w) / 2 + 60;
        const force = d < minDist ? 200000 / (d*d) : 50000 / (d*d);
        fx += (dx/d) * force;
        fy += (dy/d) * force;
      }
      for (const [eA, eB] of edges) {
        let other = null;
        if (eA === idA) other = LOCS[eB];
        else if (eB === idA) other = LOCS[eA];
        if (!other) continue;
        const bx = other.x + other.w/2, by = other.y + other.h/2;
        const dx = bx - ax, dy = by - ay;
        const d = Math.sqrt(dx*dx + dy*dy) + 1;
        const force = (d - 450) * 0.05;
        fx += (dx/d) * force;
        fy += (dy/d) * force;
      }
      A.x += fx * 0.1;
      A.y += fy * 0.1;
    }
  }
  // Shift to positive
  let minX = Infinity, minY = Infinity;
  for (const L of Object.values(LOCS)) { minX = Math.min(minX, L.x); minY = Math.min(minY, L.y); }
  if (minX < 50) for (const L of Object.values(LOCS)) L.x += 50 - minX;
  if (minY < 50) for (const L of Object.values(LOCS)) L.y += 50 - minY;
}

function registerDynamic(slug, name, connectedTo) {
  if (LOCS[slug]) return false;
  const parentId = connectedTo && LOCS[connectedTo] ? connectedTo : 'central-square';
  const parent = LOCS[parentId];
  const pcx = parent.x + parent.w/2, pcy = parent.y + parent.h/2;
  const neighborAngles = [];
  for (const [eA, eB] of edges) {
    let nbId = null;
    if (eA === parentId) nbId = eB; else if (eB === parentId) nbId = eA;
    if (!nbId || !LOCS[nbId]) continue;
    const nb = LOCS[nbId];
    neighborAngles.push(Math.atan2(nb.y + nb.h/2 - pcy, nb.x + nb.w/2 - pcx));
  }
  let angle;
  if (neighborAngles.length === 0) {
    angle = (hashStr(slug) % 360) * Math.PI / 180;
  } else {
    neighborAngles.sort((a,b) => a - b);
    let bestGap = 0, bestMid = 0;
    for (let i = 0; i < neighborAngles.length; i++) {
      const next = i+1 < neighborAngles.length ? neighborAngles[i+1] : neighborAngles[0] + 2*Math.PI;
      const gap = next - neighborAngles[i];
      if (gap > bestGap) { bestGap = gap; bestMid = neighborAngles[i] + gap/2; }
    }
    angle = bestMid;
  }
  LOCS[slug] = { n: name, x: pcx + Math.cos(angle)*450 - 110, y: pcy + Math.sin(angle)*450 - 75,
    w: 220, h: 150, c: '#6a7a6a', t: 'bld', dynamic: true, connectedTo: parentId };
  edges.push([parentId, slug]);
  return true;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Edges
  for (const [idA, idB] of edges) {
    const A = LOCS[idA], B = LOCS[idB];
    if (!A || !B) continue;
    const acx = A.x+A.w/2, acy = A.y+A.h/2, bcx = B.x+B.w/2, bcy = B.y+B.h/2;
    const eA = edgePoint(A, bcx, bcy), eB = edgePoint(B, acx, acy);
    ctx.beginPath();
    ctx.moveTo(eA.x, eA.y); ctx.lineTo(eB.x, eB.y);
    ctx.strokeStyle = '#9a8468'; ctx.lineWidth = 6; ctx.stroke();
  }
  // Buildings
  for (const [id, L] of Object.entries(LOCS)) {
    ctx.fillStyle = L.c; ctx.fillRect(L.x, L.y, L.w, L.h);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.strokeRect(L.x, L.y, L.w, L.h);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace'; ctx.textAlign = 'center';
    ctx.fillText(L.n, L.x + L.w/2, L.y + L.h/2 + 5);
    if (L.dynamic) { ctx.fillStyle = '#888'; ctx.font = '10px monospace';
      ctx.fillText(`→${L.connectedTo}`, L.x + L.w/2, L.y + L.h/2 + 20); }
  }
  document.getElementById('status').textContent = `${Object.keys(LOCS).length} locations, ${edges.length} edges`;
}

let counter = 0;
const names = ['茶馆','花园','图书馆','钟楼','市场','温泉','剧院','工坊','学院','灯塔'];
const parents = () => Object.keys(LOCS);
window.addRandom = () => {
  const name = names[counter % names.length];
  const slug = name + '-' + counter;
  const ps = parents();
  const parent = ps[Math.floor(Math.random() * ps.length)];
  registerDynamic(slug, name, parent);
  counter++;
  computeLayout();
  draw();
};
window.resetAll = () => { reset(); counter = 0; draw(); };

computeLayout();
draw();
</script>
</body></html>
